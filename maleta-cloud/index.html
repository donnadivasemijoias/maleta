<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#1a1a1a;background:#f8f0f4;min-height:100vh}.topbar{position:sticky;top:0;z-index:100;background:#7B2D4E;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25)}.topbar h1{font-size:13px;font-weight:700;flex:1;line-height:1.3}.topbar .num{font-size:11px;opacity:.85;white-space:nowrap}.resumo{background:#fff;border-bottom:2px solid #f0d8e3;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:58px;z-index:99;box-shadow:0 2px 6px rgba(0,0,0,.08)}.rb{flex:1;min-width:72px;text-align:center;background:#f8f0f4;border-radius:8px;padding:8px 6px;border-top:3px solid #7B2D4E}.rb .lb{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px}.rb .vl{font-size:15px;font-weight:700;color:#7B2D4E;margin-top:2px}.rb.com{border-top-color:#2e7d32;background:#f0f7f0}.rb.com .vl{color:#2e7d32}.actions{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}.btn{padding:9px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px;touch-action:manipulation}.btn-wa{background:#25D366;color:#fff}.btn-print{background:#7B2D4E;color:#fff}.btn-reset{background:#fff;color:#7B2D4E;border:1.5px solid #7B2D4E}.btn:active{opacity:.85;transform:scale(.97)}.com-box{margin:0 12px 8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px 14px}.com-box h3{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}.faixas{display:flex;gap:6px;flex-wrap:wrap}.faixa{flex:1;min-width:60px;padding:6px 6px;border-radius:6px;background:#f8f0f4;border:1px solid #e8c8d8;font-size:10px;text-align:center;transition:all .2s}.faixa.ativa{background:#7B2D4E;color:#fff;border-color:#7B2D4E;font-weight:700}.faixa .pct{font-size:13px;font-weight:700;display:block}.wrap{padding:0 12px 28px}.items-lb{font-size:10px;font-weight:700;color:#7B2D4E;text-transform:uppercase;letter-spacing:.4px;padding:10px 4px 5px}.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}.table-scroll::-webkit-scrollbar{height:8px}.table-scroll::-webkit-scrollbar-thumb{background:#d8b3c6;border-radius:10px}table.it{width:100%;min-width:1080px;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;table-layout:fixed}table.it thead tr{background:#7B2D4E;color:#fff}table.it thead th{padding:8px 5px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}table.it thead th.c{text-align:center}table.it thead th.r{text-align:right}table.it tbody tr{border-bottom:.5px solid #f0d8e3;transition:background .15s}table.it tbody tr:nth-child(even){background:#fdf5f8}table.it tbody tr.vendida{background:#e8f5e9!important}table.it tbody td{padding:7px 5px;vertical-align:middle;overflow:hidden}table.it tbody td.code{font-family:'Courier New',monospace;font-size:10px;color:#555;white-space:nowrap}table.it tbody td.prod-cell{font-size:11px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}table.it tbody td.c{text-align:center}table.it tbody td.r{text-align:right}table.it tbody td.price{color:#777;font-size:11px}table.it tbody td.total{font-weight:700;color:#7B2D4E;font-size:11px}.chk-wrap{display:flex;align-items:center;justify-content:center}input[type=checkbox]{width:22px;height:22px;accent-color:#7B2D4E;cursor:pointer;-webkit-appearance:checkbox;appearance:checkbox}.paid-check{width:20px!important;height:20px!important}.cli-input{width:100%;border:none;border-bottom:1px solid #ddd;font-size:14px;color:#1a1a1a;background:transparent;padding:2px 0;outline:none;min-width:0}.cli-input:focus{border-bottom-color:#7B2D4E}.cli-input::placeholder{color:#bbb;font-style:italic}.pay-select{width:100%;border:1px solid #ddd;border-radius:6px;background:#fff;padding:5px 4px;font-size:13px;outline:none}.pay-select:focus{border-color:#7B2D4E}#flash{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2e7d32;color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;z-index:200;max-width:90vw;text-align:center}#flash.show{opacity:1}.save-status{position:fixed;right:12px;bottom:12px;z-index:150;background:#fff;color:#7B2D4E;border:1px solid #e8c8d8;border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.12);opacity:.95}.save-status.offline{color:#b26a00;border-color:#f0c36d}.save-status.ok{color:#2e7d32;border-color:#a5d6a7}.save-status.err{color:#b83232;border-color:#ef9a9a}.client-summary{margin:12px;background:#fff;border:1px solid #e8c8d8;border-radius:10px;padding:12px 12px 16px;page-break-before:always}.client-summary h3{font-size:12px;color:#7B2D4E;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}.client-summary .hint{font-size:11px;color:#777;margin-bottom:10px;line-height:1.35}.summary-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.client-card{border:1px solid #f0d8e3;border-radius:10px;background:#fffafc;padding:10px;margin:8px 0}.client-card-head{display:flex;gap:8px;justify-content:space-between;align-items:flex-start;margin-bottom:6px}.client-name{font-weight:700;color:#7B2D4E;font-size:14px}.client-total{text-align:right;font-weight:700;color:#1a1a1a;font-size:13px;white-space:nowrap}.client-meta{font-size:11px;color:#666;line-height:1.45;margin-bottom:8px}.client-items{font-size:11px;color:#333;line-height:1.45;border-top:1px dashed #e8c8d8;padding-top:6px;margin-top:6px}.client-copy{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.btn-mini{padding:7px 10px;border-radius:16px;border:1px solid #7B2D4E;background:#fff;color:#7B2D4E;font-size:11px;font-weight:700;cursor:pointer}.btn-mini.primary{background:#7B2D4E;color:#fff}.empty-summary{font-size:12px;color:#777;background:#f8f0f4;border-radius:8px;padding:10px}.anchor-btn{background:#fff;color:#7B2D4E;border:1.5px solid #7B2D4E}.erro-box{margin:40px auto;max-width:430px;padding:30px;text-align:center;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}.erro-box h2{color:#b83232;margin-bottom:10px}.erro-box p{color:#666;font-size:13px;line-height:1.45}@media(max-width:480px){.topbar h1{font-size:11px}.rb .vl{font-size:13px}.wrap{padding-left:8px;padding-right:8px}.items-lb::after{content:'  • arraste a tabela para o lado';font-weight:400;color:#888;text-transform:none;letter-spacing:0}}@media print{.topbar,.resumo,.actions,.com-box,#flash,.save-status{display:none!important}body{background:#fff}.table-scroll{overflow:visible}table.it{min-width:0}table.it tbody tr.vendida{background:#e8f5e9!important;-webkit-print-color-adjust:exact}input,select{border:none!important}}
</style>
</head>
<body>
<div id="app"><div style="padding:60px;text-align:center;color:#888">Carregando maleta...</div></div>
<div id="flash"></div>
<div id="saveStatus" class="save-status">Carregando...</div>
<script>
const API_BASE = 'https://dd-maleta-romaneio-api.donnadivasemijoias.workers.dev';
const params = new URLSearchParams(location.search);
const PUBLIC_CODE = params.get('m') || params.get('code') || '';
const EDIT_KEY = params.get('k') || params.get('edit_key') || '';
const VIEW_KEY = params.get('vkey') || params.get('view_key') || '';
let META = null, ITEMS = [], COMISSOES = [[0,350,10],[350,650,20],[650,1000,25],[1000,999999,30]], FONE_LOJA='', LAST_CLIENT_GROUPS=[];
let saveTimer = null;
function brl(v){return 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function setSaveStatus(txt,cls){const el=document.getElementById('saveStatus'); if(!el)return; el.textContent=txt; el.className='save-status '+(cls||'')}
function localKey(){return 'dd_maleta_cloud_v1:'+PUBLIC_CODE}
function getPct(valor){let pct=COMISSOES[0][2],idx=0;COMISSOES.forEach(([lo,hi,p],j)=>{if(valor>=lo&&valor<hi){pct=p;idx=j}});return {pct,idx}}
function collectState(){return ITEMS.map((item,i)=>({item_uid:item.item_uid,codigo:item.codigo,vendido:!!document.getElementById('chk_'+i)?.checked,cliente:document.getElementById('cli_'+i)?.value||'',pagamento:document.getElementById('pay_'+i)?.value||'',pago:!!document.getElementById('paid_'+i)?.checked}))}
function saveLocal(){try{localStorage.setItem(localKey(),JSON.stringify({t:Date.now(),itens:collectState()}))}catch(e){}}
function loadLocalMap(){try{const raw=localStorage.getItem(localKey()); if(!raw)return {}; const data=JSON.parse(raw); const out={}; (data.itens||[]).forEach(x=>{if(x.item_uid)out[x.item_uid]=x}); return out}catch(e){return {}}}
function toggleRowSilente(i){const row=document.getElementById('row_'+i);const chk=document.getElementById('chk_'+i);if(row&&chk)row.classList.toggle('vendida',chk.checked)}
function changed(i){toggleRowSilente(i); calcular(); saveLocal(); scheduleSave()}
function aplicarMarcacoes(remoteRows){const local=loadLocalMap(); const remote={}; (remoteRows||[]).forEach(r=>{if(r.item_uid)remote[r.item_uid]=r}); ITEMS.forEach((item,i)=>{const r=local[item.item_uid] || remote[item.item_uid] || {}; const chk=document.getElementById('chk_'+i), cli=document.getElementById('cli_'+i), pay=document.getElementById('pay_'+i), paid=document.getElementById('paid_'+i); if(chk)chk.checked=!!r.vendido; if(cli)cli.value=r.cliente||''; if(pay)pay.value=r.pagamento||''; if(paid)paid.checked=!!r.pago; toggleRowSilente(i)}); calcular(); saveLocal()}
function calcular(){let vendidas=0,valorVendido=0;ITEMS.forEach((item,i)=>{const chk=document.getElementById('chk_'+i); if(chk&&chk.checked){vendidas++; valorVendido+=Number(item.preco||0)}}); const {pct,idx}=getPct(valorVendido); const el=id=>document.getElementById(id); if(el('s-total'))el('s-total').textContent=ITEMS.length; if(el('s-vend'))el('s-vend').textContent=vendidas; if(el('s-valor'))el('s-valor').textContent=brl(valorVendido); if(el('s-pct'))el('s-pct').textContent=ITEMS.length?Math.round(vendidas/ITEMS.length*100)+'%':'0%'; if(el('s-com'))el('s-com').textContent=brl(valorVendido*pct/100); COMISSOES.forEach((_,j)=>{const f=el('f'+j); if(f)f.classList.toggle('ativa',j===idx)}); renderClientSummary()}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer); setSaveStatus('Salvando...',''); saveTimer=setTimeout(saveCloud,700)}
async function saveCloud(){if(!PUBLIC_CODE||!EDIT_KEY){setSaveStatus('Somente leitura','offline');return} try{const res=await fetch(API_BASE+'/maleta/online-salvar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({public_code:PUBLIC_CODE,edit_key:EDIT_KEY,itens:collectState()})}); const out=await res.json(); if(out&&out.ok){setSaveStatus('Salvo online','ok')}else{setSaveStatus('Salvo neste aparelho','offline')}}catch(e){setSaveStatus('Salvo neste aparelho','offline')}}
function render(meta,itens,marcacoes){META=meta||{}; ITEMS=itens||[]; FONE_LOJA=META.telefone_loja||''; const faixasHtml=COMISSOES.map(([lo,hi,p],j)=>`<div class="faixa" id="f${j}"><span class="pct">${p}%</span>${hi>=999999?'acima de R$ '+lo.toLocaleString('pt-BR'):'R$ '+lo.toLocaleString('pt-BR')+' a R$ '+hi.toLocaleString('pt-BR')}</div>`).join(''); const rows=ITEMS.map((item,i)=>`<tr id="row_${i}"><td class="c" style="color:#aaa;font-size:10px">${i+1}</td><td class="c"><div class="chk-wrap"><input type="checkbox" id="chk_${i}" onchange="changed(${i})"></div></td><td class="code">${esc(item.codigo||'')}</td><td class="prod-cell" title="${esc(item.descricao||'—')}">${esc(item.descricao||'—')}</td><td class="c" style="font-size:10px;color:#888">${esc(item.banho||'')}</td><td class="r price">${brl(item.preco)}</td><td><input class="cli-input" type="text" id="cli_${i}" placeholder="Cliente..." oninput="changed(${i})"></td><td><select class="pay-select" id="pay_${i}" onchange="changed(${i})"><option value="">Forma...</option><option>Pix</option><option>Dinheiro</option><option>Débito</option><option>Crédito</option><option>Link</option><option>Outro</option></select></td><td class="c"><input class="paid-check" type="checkbox" id="paid_${i}" onchange="changed(${i})"></td></tr>`).join(''); document.title='Maleta — '+(META.revendedora||'Revendedora'); document.getElementById('app').innerHTML=`<div class="topbar"><h1>Donna Diva Semijoias<br>${esc(META.revendedora||'Revendedora')}</h1><span class="num">Rom. nº ${esc(META.romaneio||'—')} | ${esc(META.data_pedido||'')}</span></div><div class="resumo"><div class="rb"><div class="lb">Peças enviadas</div><div class="vl" id="s-total">${ITEMS.length}</div></div><div class="rb"><div class="lb">Peças vendidas</div><div class="vl" id="s-vend">0</div></div><div class="rb"><div class="lb">Valor vendido</div><div class="vl" id="s-valor">R$ 0,00</div></div><div class="rb"><div class="lb">% da maleta</div><div class="vl" id="s-pct">0%</div></div><div class="rb com"><div class="lb">Sua comissão</div><div class="vl" id="s-com">R$ 0,00</div></div></div><div class="actions"><button class="btn btn-wa" onclick="enviarWA()">✉ Enviar resumo por WhatsApp</button><button class="btn anchor-btn" onclick="scrollResumoClientes()">👥 Resumo por cliente</button><button class="btn btn-print" onclick="window.print()">🖨 Imprimir / PDF</button><button class="btn btn-reset" onclick="limparLocal()">↻ Recomeçar neste aparelho</button></div><div class="com-box"><h3>Tabela de comissões</h3><div class="faixas">${faixasHtml}</div></div><div class="wrap"><div class="items-lb">Peças da maleta — marque as que foram vendidas</div><div class="table-scroll"><table class="it"><thead><tr><th class="c" style="width:32px">Nº</th><th class="c" style="width:46px">Vend.</th><th style="width:74px">Código</th><th style="width:360px">Produto</th><th class="c" style="width:56px">Banho</th><th class="r" style="width:70px">Valor</th><th style="width:260px">Cliente</th><th style="width:120px">Pagamento</th><th class="c" style="width:56px">Pago</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="client-summary"><h3>Resumo por cliente</h3><div class="hint">Use esta área para conferir quanto cada cliente comprou. A revendedora pode copiar um resumo simples ou uma lista detalhada para enviar individualmente.</div><div class="summary-actions"><button class="btn-mini primary" onclick="copiarResumoClientes(false)">Copiar resumo geral</button><button class="btn-mini" onclick="copiarResumoClientes(true)">Copiar detalhado geral</button></div><div id="clientesResumo"></div></div>`; document.querySelectorAll('input,select').forEach(el=>{el.style.fontSize='16px'}); aplicarMarcacoes(marcacoes); setSaveStatus(EDIT_KEY?'Salvo online':'Somente leitura',EDIT_KEY?'ok':'offline')}
async function init(){if(!PUBLIC_CODE){document.getElementById('app').innerHTML='<div class="erro-box"><h2>Maleta não encontrada</h2><p>Este link não contém o código da maleta.</p></div>';setSaveStatus('Link inválido','err');return} try{const q=new URLSearchParams({m:PUBLIC_CODE}); if(EDIT_KEY)q.set('k',EDIT_KEY); if(VIEW_KEY)q.set('vkey',VIEW_KEY); const res=await fetch(API_BASE+'/maleta/online-carregar?'+q.toString()); const data=await res.json(); if(!data.ok)throw new Error(data.error||'Não foi possível carregar'); render(data.maleta,data.itens,data.marcacoes); if(EDIT_KEY) saveCloud(); }catch(e){document.getElementById('app').innerHTML='<div class="erro-box"><h2>Erro ao carregar maleta</h2><p>'+esc(e.message||e)+'</p><p>Solicite um novo link à loja.</p></div>';setSaveStatus('Erro','err')}}

function normalizeClientName(name){return String(name||'').trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').toLowerCase()}
function buildClientGroups(){const map=new Map();ITEMS.forEach((item,i)=>{const chk=document.getElementById('chk_'+i);if(!chk||!chk.checked)return;const raw=(document.getElementById('cli_'+i)?.value||'').trim();const name=raw||'Cliente não informado';const key=normalizeClientName(name)||'cliente-nao-informado';const pagamento=document.getElementById('pay_'+i)?.value||'';const pago=!!document.getElementById('paid_'+i)?.checked;if(!map.has(key))map.set(key,{nome:name,qtd:0,total:0,pagoValor:0,pendente:0,itens:[]});const g=map.get(key);const preco=Number(item.preco||0);g.qtd+=1;g.total+=preco;if(pago)g.pagoValor+=preco;else g.pendente+=preco;g.itens.push({codigo:item.codigo||'',descricao:item.descricao||'',preco,pagamento,pago})});return Array.from(map.values()).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'))}
function textoCliente(g,detalhado){if(!g)return'';const linhas=[`Olá, ${g.nome}! Segue seu resumo Donna Diva 💎`,'',`${g.qtd} peça${g.qtd===1?'':'s'} — Total: ${brl(g.total)}`,`Pago: ${brl(g.pagoValor)} | Pendente: ${brl(g.pendente)}`];if(detalhado){linhas.push('','Itens:');g.itens.forEach(it=>{linhas.push(`• ${it.codigo} — ${String(it.descricao||'').substring(0,55)} — ${brl(it.preco)}${it.pagamento?' — '+it.pagamento:''}${it.pago?' — Pago':' — Pendente'}`)})}return linhas.join('\n')}
function textoGeralClientes(detalhado){const gs=buildClientGroups();if(!gs.length)return'Nenhuma venda marcada no romaneio.';const total=gs.reduce((a,g)=>a+g.total,0);const qtd=gs.reduce((a,g)=>a+g.qtd,0);const linhas=['*Resumo por cliente — Donna Diva Semijoias*','',`${gs.length} cliente${gs.length===1?'':'s'} | ${qtd} peça${qtd===1?'':'s'} | Total: ${brl(total)}`,''];gs.forEach(g=>{linhas.push(`• ${g.nome}: ${g.qtd} peça${g.qtd===1?'':'s'} — ${brl(g.total)} | Pago: ${brl(g.pagoValor)} | Pendente: ${brl(g.pendente)}`);if(detalhado){g.itens.forEach(it=>linhas.push(`   - ${it.codigo} — ${String(it.descricao||'').substring(0,45)} — ${brl(it.preco)}${it.pagamento?' — '+it.pagamento:''}${it.pago?' — Pago':' — Pendente'}`))}});return linhas.join('\n')}
async function copiarTexto(txt){try{await navigator.clipboard.writeText(txt);showFlash('Copiado para a área de transferência')}catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showFlash('Copiado para a área de transferência')}}
function copiarClienteIdx(idx,detalhado){copiarTexto(textoCliente(LAST_CLIENT_GROUPS[idx],detalhado))}
function copiarResumoClientes(detalhado){copiarTexto(textoGeralClientes(detalhado))}
function scrollResumoClientes(){const el=document.getElementById('clientesResumo');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}
function renderClientSummary(){const el=document.getElementById('clientesResumo');if(!el)return;const gs=buildClientGroups();LAST_CLIENT_GROUPS=gs;if(!gs.length){el.innerHTML='<div class="empty-summary">Nenhuma peça vendida marcada ainda. Conforme as vendas forem marcadas e os clientes preenchidos, o resumo aparecerá aqui.</div>';return}const total=gs.reduce((a,g)=>a+g.total,0);const qtd=gs.reduce((a,g)=>a+g.qtd,0);const cards=gs.map((g,idx)=>`<div class="client-card"><div class="client-card-head"><div class="client-name">${esc(g.nome)}</div><div class="client-total">${brl(g.total)}</div></div><div class="client-meta">${g.qtd} peça${g.qtd===1?'':'s'} · Pago: ${brl(g.pagoValor)} · Pendente: ${brl(g.pendente)}</div><div class="client-items">${g.itens.map(it=>`<div>• ${esc(it.codigo)} — ${esc(String(it.descricao||'').substring(0,52))} — ${brl(it.preco)}${it.pagamento?' · '+esc(it.pagamento):''}${it.pago?' · Pago':' · Pendente'}</div>`).join('')}</div><div class="client-copy"><button class="btn-mini primary" onclick="copiarClienteIdx(${idx},false)">Copiar resumo</button><button class="btn-mini" onclick="copiarClienteIdx(${idx},true)">Copiar detalhado</button></div></div>`).join('');el.innerHTML=`<div class="client-meta"><b>${gs.length}</b> cliente${gs.length===1?'':'s'} · <b>${qtd}</b> peça${qtd===1?'':'s'} · Total <b>${brl(total)}</b></div>${cards}`}
function enviarWA(){let vendidas=0,valorVendido=0; const linhas=[]; ITEMS.forEach((item,i)=>{const chk=document.getElementById('chk_'+i), cli=document.getElementById('cli_'+i)?.value||'', pay=document.getElementById('pay_'+i)?.value||'', paid=document.getElementById('paid_'+i)?.checked?'Sim':'Não'; if(chk&&chk.checked){vendidas++; valorVendido+=Number(item.preco||0); linhas.push('✅ '+item.codigo+' | '+String(item.descricao||'').substring(0,40)+' | '+brl(item.preco)+(cli?' — Cliente: '+cli:'')+(pay?' — Pagamento: '+pay:'')+' — Pago: '+paid)}}); const {pct}=getPct(valorVendido); const pctMaleta=ITEMS.length?Math.round(vendidas/ITEMS.length*100):0; const msg=['*Donna Diva Semijoias — Resumo de Vendas*','Revendedora: '+(META.revendedora||''),'Romaneio: '+(META.romaneio||''),'',linhas.length?'*Peças vendidas:*':'Nenhuma peça marcada como vendida.',...linhas,'','Total vendido: '+brl(valorVendido)+' ('+pctMaleta+'% da maleta)','Comissão ('+pct+'%): *'+brl(valorVendido*pct/100)+'*'].join('\n'); const url='https://wa.me/'+(FONE_LOJA||'')+'?text='+encodeURIComponent(msg); if(navigator.share){navigator.share({text:msg}).catch(()=>window.open(url,'_blank'))}else{window.open(url,'_blank')}}
function limparLocal(){if(!confirm('Limpar marcações salvas neste aparelho? O que já salvou online permanecerá no sistema.'))return; try{localStorage.removeItem(localKey())}catch(e){} ITEMS.forEach((_,i)=>{const chk=document.getElementById('chk_'+i), cli=document.getElementById('cli_'+i), pay=document.getElementById('pay_'+i), paid=document.getElementById('paid_'+i); if(chk)chk.checked=false; if(cli)cli.value=''; if(pay)pay.value=''; if(paid)paid.checked=false; toggleRowSilente(i)}); calcular(); saveLocal(); scheduleSave(); showFlash('Marcações limpas neste aparelho')}
function showFlash(msg,dur){const fl=document.getElementById('flash');fl.textContent=msg;fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),dur||2500)}
init();
</script>
