<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Maleta — Donna Diva Semijoias</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#1a1a1a;background:#f8f0f4;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:#7B2D4E;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar h1{font-size:13px;font-weight:700;flex:1;line-height:1.3}.topbar .num{font-size:11px;opacity:.8;white-space:nowrap}
.resumo{background:#fff;border-bottom:2px solid #f0d8e3;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:58px;z-index:99;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.rb{flex:1;min-width:72px;text-align:center;background:#f8f0f4;border-radius:8px;padding:8px 6px;border-top:3px solid #7B2D4E}.rb .lb{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px}.rb .vl{font-size:15px;font-weight:700;color:#7B2D4E;margin-top:2px}.rb.com{border-top-color:#2e7d32;background:#f0f7f0}.rb.com .vl{color:#2e7d32}
.actions{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}.btn{padding:9px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px;touch-action:manipulation}.btn-wa{background:#25D366;color:#fff}.btn-print{background:#7B2D4E;color:#fff}.btn:active{opacity:.85;transform:scale(.97)}
.com-box{margin:0 12px 8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px 14px}.com-box h3{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}.faixas{display:flex;gap:6px;flex-wrap:wrap}.faixa{flex:1;min-width:60px;padding:6px 6px;border-radius:6px;background:#f8f0f4;border:1px solid #e8c8d8;font-size:10px;text-align:center;transition:all .2s}.faixa.ativa{background:#7B2D4E;color:#fff;border-color:#7B2D4E;font-weight:700}.faixa .pct{font-size:13px;font-weight:700;display:block}
.wrap{padding:0 12px 24px}.items-lb{font-size:10px;font-weight:700;color:#7B2D4E;text-transform:uppercase;letter-spacing:.4px;padding:10px 4px 4px}.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-radius:8px}.table-scroll::-webkit-scrollbar{height:8px}.table-scroll::-webkit-scrollbar-thumb{background:#d8b3c6;border-radius:10px}
table.it{width:100%;min-width:1080px;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;table-layout:fixed}table.it thead tr{background:#7B2D4E;color:#fff}table.it thead th{padding:8px 5px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}table.it thead th.c{text-align:center}table.it thead th.r{text-align:right}table.it tbody tr{border-bottom:.5px solid #f0d8e3;transition:background .15s}table.it tbody tr:nth-child(even){background:#fdf5f8}table.it tbody tr.vendida{background:#e8f5e9!important}table.it tbody td{padding:7px 5px;vertical-align:middle;overflow:hidden}table.it tbody td.code{font-family:'Courier New',monospace;font-size:10px;color:#555;white-space:nowrap}table.it tbody td.prod-cell{font-size:11px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}table.it tbody td.c{text-align:center}table.it tbody td.r{text-align:right}table.it tbody td.price{color:#777;font-size:11px}table.it tbody td.total{font-weight:700;color:#7B2D4E;font-size:11px}.chk-wrap{display:flex;align-items:center;justify-content:center}input[type=checkbox]{width:22px;height:22px;accent-color:#7B2D4E;cursor:pointer;-webkit-appearance:checkbox;appearance:checkbox}.paid-check{width:20px!important;height:20px!important}.cli-input{width:100%;border:none;border-bottom:1px solid #ddd;font-size:14px;color:#1a1a1a;background:transparent;padding:2px 0;outline:none;min-width:0}.cli-input:focus{border-bottom-color:#7B2D4E}.cli-input::placeholder{color:#bbb;font-style:italic}.pay-select{width:100%;border:1px solid #ddd;border-radius:6px;background:#fff;padding:5px 4px;font-size:13px;outline:none}.pay-select:focus{border-color:#7B2D4E}
#flash{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2e7d32;color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;z-index:200;max-width:90vw;text-align:center}#flash.show{opacity:1}.save-status{position:fixed;right:12px;bottom:12px;z-index:150;background:#fff;color:#7B2D4E;border:1px solid #e8c8d8;border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.12);opacity:.92}.save-status.offline{color:#b26a00;border-color:#f0c36d}.save-status.ok{color:#2e7d32;border-color:#a5d6a7}.save-status.err{color:#b83232;border-color:#ef9a9a}
.erro-box{margin:40px auto;max-width:400px;padding:30px;text-align:center;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}.erro-box h2{color:#b83232;margin-bottom:10px}.erro-box p{color:#666;font-size:13px}
@media(max-width:480px){.topbar h1{font-size:11px}.rb .vl{font-size:13px}.wrap{padding-left:8px;padding-right:8px}.items-lb::after{content:'  • arraste a tabela para o lado';font-weight:400;color:#888;text-transform:none;letter-spacing:0}}
@media print{.topbar,.resumo,.actions,.com-box,#flash,.save-status{display:none!important}body{background:#fff}.table-scroll{overflow:visible}table.it{min-width:0}table.it tbody tr.vendida{background:#e8f5e9!important;-webkit-print-color-adjust:exact}input,select{border:none!important}}
</style>
</head>
<body>
<div id="app"><div style="padding:60px;text-align:center;color:#888">Carregando maleta...</div></div>
<div id="flash"></div>
<div id="saveStatus" class="save-status">Salvamento local</div>
<script>
const API_BASE = 'https://dd-maleta-romaneio-api.donnadivasemijoias.workers.dev';
let ITEMS = [], FONE_LOJA = '', COMISSOES = [], TOTAL_PECAS = 0, PAYLOAD = null;
const HASH_RAW = location.hash.replace(/^#/,'');
const SAVE_KEY = 'maleta_' + HASH_RAW.substring(0, 19);
const BACKUP_KEY = SAVE_KEY + '_backup_before_cloudflare_v1';
let CLOUD = { maleta_id:'', edit_key:'', loaded:false, syncing:false, timer:null };
async function decompress(b64){const bin=atob(b64.replace(/-/g,'+').replace(/_/g,'/'));const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);const chunks=[];const out=new WritableStream({write(chunk){chunks.push(chunk)}});const src=new ReadableStream({start(c){c.enqueue(buf);c.close()}});await src.pipeThrough(new DecompressionStream('deflate')).pipeTo(out);const all=new Uint8Array(chunks.reduce((a,b)=>a+b.length,0));let pos=0;for(const c of chunks){all.set(c,pos);pos+=c.length}return new TextDecoder().decode(all)}
function brl(v){return 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
async function sha256Hex(s){const data=new TextEncoder().encode(s);const hash=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function setupCloudIdentity(data){const basis = HASH_RAW || JSON.stringify(data).slice(0,1000);const dig = await sha256Hex(basis);CLOUD.maleta_id = 'legacy_' + dig.substring(0,24);CLOUD.edit_key = dig.substring(24) + dig.substring(0,24)}
function setSaveStatus(txt,cls){const el=document.getElementById('saveStatus');if(!el)return;el.textContent=txt;el.className='save-status '+(cls||'')}
function getState(){const state={};ITEMS.forEach((_,i)=>{const chk=document.getElementById('chk_'+i);const cli=document.getElementById('cli_'+i);const pay=document.getElementById('pay_'+i);const paid=document.getElementById('paid_'+i);state['chk_'+i]=chk?chk.checked:false;state['cli_'+i]=cli?cli.value:'';state['pay_'+i]=pay?pay.value:'';state['paid_'+i]=paid?paid.checked:false});return state}
function applyState(state){if(!state)return false;let any=false;Object.entries(state).forEach(([k,v])=>{const el=document.getElementById(k);if(!el)return;if(el.type==='checkbox'){el.checked=!!v;const parts=k.split('_');const idx=parseInt(parts[1]);if(k.startsWith('chk_'))toggleRowSilente(idx)}else{el.value=v||''}if(v)any=true});return any}
function backupLocalIfNeeded(){try{const raw=localStorage.getItem(SAVE_KEY);if(raw && !localStorage.getItem(BACKUP_KEY)){localStorage.setItem(BACKUP_KEY, raw)}}catch(e){}}
function salvarEstado(){const state=getState();try{localStorage.setItem(SAVE_KEY,JSON.stringify(state))}catch(e){}scheduleCloudSave()}
function restaurarEstado(){try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;backupLocalIfNeeded();const state=JSON.parse(raw);return applyState(state)}catch(e){return false}}
function remoteToState(rows){const state={};const byCode={};(rows||[]).forEach(r=>{byCode[String(r.codigo)]=r});ITEMS.forEach((item,i)=>{const r=byCode[String(item.c||'')]||byCode[String(item.codigo||'')];if(!r)return;state['chk_'+i]=!!r.vendido;state['cli_'+i]=r.cliente||'';state['pay_'+i]=r.pagamento||'';state['paid_'+i]=!!r.pago});return state}
function mergeStates(localState,remoteState,hasLocal){const merged={...remoteState};ITEMS.forEach((_,i)=>{['chk','cli','pay','paid'].forEach(prefix=>{const k=prefix+'_'+i;const localHas=Object.prototype.hasOwnProperty.call(localState,k);const localVal=localState[k];const remoteVal=remoteState[k];if(hasLocal && localHas){if(prefix==='cli'||prefix==='pay'){merged[k]=localVal || remoteVal || ''}else{merged[k]=localVal}}else{merged[k]=remoteVal ?? localVal ?? (prefix==='cli'||prefix==='pay'?'':false)}})});return merged}
async function loadCloudAndMerge(){if(!CLOUD.maleta_id||!CLOUD.edit_key)return;try{const hasLocal=!!localStorage.getItem(SAVE_KEY);const localState=hasLocal?JSON.parse(localStorage.getItem(SAVE_KEY)||'{}'):{};const url=API_BASE+'/maleta/carregar?maleta_id='+encodeURIComponent(CLOUD.maleta_id)+'&edit_key='+encodeURIComponent(CLOUD.edit_key);const res=await fetch(url);const data=await res.json();if(data && data.ok && data.exists){const merged=mergeStates(localState,remoteToState(data.itens||[]),hasLocal);applyState(merged);try{localStorage.setItem(SAVE_KEY,JSON.stringify(merged))}catch(e){}}await saveCloudNow();CLOUD.loaded=true}catch(e){setSaveStatus('Salvo neste aparelho','offline')}}
function buildCloudPayload(){return {maleta_id:CLOUD.maleta_id,edit_key:CLOUD.edit_key,revendedora:(PAYLOAD&&PAYLOAD.r)||'',romaneio:(PAYLOAD&&PAYLOAD.n)||'',itens:ITEMS.map((item,i)=>({codigo:String(item.c||''),vendido:!!document.getElementById('chk_'+i)?.checked,cliente:document.getElementById('cli_'+i)?.value||'',pagamento:document.getElementById('pay_'+i)?.value||'',pago:!!document.getElementById('paid_'+i)?.checked}))}}
function scheduleCloudSave(){if(CLOUD.timer)clearTimeout(CLOUD.timer);setSaveStatus('Salvando...','');CLOUD.timer=setTimeout(saveCloudNow,900)}
async function saveCloudNow(){if(!CLOUD.maleta_id||!CLOUD.edit_key||!ITEMS.length)return;try{const res=await fetch(API_BASE+'/maleta/salvar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildCloudPayload())});const out=await res.json();if(out&&out.ok){setSaveStatus('Salvo online','ok')}else{setSaveStatus('Salvo neste aparelho','offline')}}catch(e){setSaveStatus('Salvo neste aparelho','offline')}}
function toggleRowSilente(i){const row=document.getElementById('row_'+i);const chk=document.getElementById('chk_'+i);if(row&&chk)row.classList.toggle('vendida',chk.checked)}
function toggleRow(i){toggleRowSilente(i);calcular();salvarEstado()}
function calcular(){let vendidas=0,valorVendido=0;ITEMS.forEach((_,i)=>{const chk=document.getElementById('chk_'+i);if(chk&&chk.checked){vendidas++;valorVendido+=ITEMS[i].p}});let pct=COMISSOES.length?COMISSOES[0][2]:10;let faixaAtiva=0;COMISSOES.forEach(([lo,hi,p],j)=>{if(valorVendido>=lo&&valorVendido<hi){pct=p;faixaAtiva=j}});const el=id=>document.getElementById(id);if(el('s-vend'))el('s-vend').textContent=vendidas;if(el('s-valor'))el('s-valor').textContent=brl(valorVendido);if(el('s-pct'))el('s-pct').textContent=TOTAL_PECAS>0?Math.round(vendidas/TOTAL_PECAS*100)+'%':'0%';if(el('s-com'))el('s-com').textContent=brl(valorVendido*pct/100);COMISSOES.forEach((_,j)=>{const f=document.getElementById('f'+j);if(f)f.classList.toggle('ativa',j===faixaAtiva)})}
function enviarWA(){let vendidas=0,valorVendido=0;const linhas=[];ITEMS.forEach((item,i)=>{const chk=document.getElementById('chk_'+i);const cli=(document.getElementById('cli_'+i)||{}).value||'';const pay=(document.getElementById('pay_'+i)||{}).value||'';const paid=(document.getElementById('paid_'+i)||{}).checked?'Sim':'Não';if(chk&&chk.checked){vendidas++;valorVendido+=item.p;linhas.push('✅ '+item.c+' | '+(item.d||'').substring(0,40)+' | '+brl(item.p)+(cli?' — Cliente: '+cli:'')+(pay?' — Pagamento: '+pay:'')+' — Pago: '+paid)}});let pct=COMISSOES.length?COMISSOES[0][2]:10,faixaLabel=(COMISSOES[0]?.[2]||10)+'%';COMISSOES.forEach(([lo,hi,p])=>{if(valorVendido>=lo&&valorVendido<hi){pct=p;faixaLabel=p+'%'}});const pctMaleta=TOTAL_PECAS>0?Math.round(vendidas/TOTAL_PECAS*100):0;const rev=document.title.replace('Maleta — ','');const msg=['*Donna Diva Semijoias — Resumo de Vendas*','Revendedora: '+rev,'',linhas.length?'*Peças vendidas:*':'Nenhuma peça marcada como vendida.',...linhas,'','Total vendido: '+brl(valorVendido)+' ('+pctMaleta+'% da maleta)','Comissão ('+faixaLabel+'): *'+brl(valorVendido*pct/100)+'*'].join('\n');const url='https://wa.me/'+(FONE_LOJA||'')+'?text='+encodeURIComponent(msg);if(navigator.share){navigator.share({text:msg}).catch(()=>window.open(url,'_blank'))}else{window.open(url,'_blank')}}
function limparEstado(){if(!confirm('Apagar todas as marcações e nomes digitados?'))return;backupLocalIfNeeded();try{localStorage.removeItem(SAVE_KEY)}catch(e){}ITEMS.forEach((_,i)=>{const chk=document.getElementById('chk_'+i);const cli=document.getElementById('cli_'+i);const pay=document.getElementById('pay_'+i);const paid=document.getElementById('paid_'+i);if(chk){chk.checked=false;toggleRowSilente(i)}if(cli)cli.value='';if(pay)pay.value='';if(paid)paid.checked=false});calcular();salvarEstado();showFlash('Marcações apagadas',2000)}
function showFlash(msg,dur){const fl=document.getElementById('flash');fl.textContent=msg;fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),dur||3000)}
function renderApp(data){PAYLOAD=data;ITEMS=data.i||[];FONE_LOJA=data.w||'';TOTAL_PECAS=ITEMS.length;COMISSOES=(data.c||[[0,350,10],[350,650,20],[650,1000,25],[1000,999999,30]]).map(x=>[x[0],x[1],x[2]]);const faixasHtml=COMISSOES.map(([lo,hi,p],j)=>{const hiStr=hi>=999999?'acima de R$ '+Number(lo).toLocaleString('pt-BR'):'R$ '+Number(lo).toLocaleString('pt-BR')+' a R$\u00a0'+Number(hi).toLocaleString('pt-BR');return `<div class="faixa" id="f${j}"><span class="pct">${p}%</span>${hiStr}</div>`}).join('');const linhas=ITEMS.map((item,i)=>`<tr id="row_${i}"><td class="c" style="color:#aaa;font-size:10px">${i+1}</td><td class="c"><div class="chk-wrap"><input type="checkbox" id="chk_${i}" onchange="toggleRow(${i})"></div></td><td class="code">${escapeHtml(item.c||'')}</td><td class="prod-cell" title="${escapeHtml(item.d||'—')}">${escapeHtml(item.d||'—')}</td><td class="c" style="font-size:10px;color:#888">${escapeHtml(item.b||'')}</td><td class="r price">${brl(item.p)}</td><td><input class="cli-input" type="text" id="cli_${i}" placeholder="Cliente..." oninput="salvarEstado()"></td><td><select class="pay-select" id="pay_${i}" onchange="salvarEstado()"><option value="">Forma...</option><option>Pix</option><option>Dinheiro</option><option>Débito</option><option>Crédito</option><option>Link</option><option>Outro</option></select></td><td class="c"><input class="paid-check" type="checkbox" id="paid_${i}" onchange="salvarEstado()"></td></tr>`).join('');const rev=data.r||'Revendedora';document.title='Maleta — '+rev;document.getElementById('app').innerHTML=`<div class="topbar"><h1>Donna Diva Semijoias<br>${escapeHtml(rev)}</h1><span class="num">Rom. nº ${escapeHtml(data.n||'—')} | ${escapeHtml(data.d||'')}</span></div><div class="resumo"><div class="rb"><div class="lb">Peças enviadas</div><div class="vl">${TOTAL_PECAS}</div></div><div class="rb"><div class="lb">Peças vendidas</div><div class="vl" id="s-vend">0</div></div><div class="rb"><div class="lb">Valor vendido</div><div class="vl" id="s-valor">R$ 0,00</div></div><div class="rb"><div class="lb">% da maleta</div><div class="vl" id="s-pct">0%</div></div><div class="rb com"><div class="lb">Sua comissão</div><div class="vl" id="s-com">R$ 0,00</div></div></div><div class="actions"><button class="btn btn-wa" onclick="enviarWA()">&#9993; Enviar resumo por WhatsApp</button><button class="btn btn-print" onclick="window.print()">&#128438; Imprimir / PDF</button><button class="btn" style="background:#fff;color:#7B2D4E;border:1.5px solid #7B2D4E" onclick="limparEstado()">&#x21BA; Recomeçar</button></div><div class="com-box"><h3>Tabela de comissões</h3><div class="faixas">${faixasHtml}</div></div><div class="wrap"><div class="items-lb">Peças da maleta — marque as que foram vendidas</div><div class="table-scroll"><table class="it"><thead><tr><th class="c" style="width:32px">Nº</th><th class="c" style="width:46px">Vend.</th><th style="width:74px">Código</th><th style="width:360px">Produto</th><th class="c" style="width:56px">Banho</th><th class="r" style="width:70px">Valor</th><th style="width:260px">Cliente</th><th style="width:120px">Pagamento</th><th class="c" style="width:56px">Pago</th></tr></thead><tbody>${linhas}</tbody></table></div></div>`;document.querySelectorAll('input,select').forEach(el=>{el.style.fontSize='16px'});const restaurou=restaurarEstado();calcular();setSaveStatus('Salvamento local','');setupCloudIdentity(data).then(()=>loadCloudAndMerge())}
async function init(){const hash=location.hash.replace(/^#/,'');if(!hash){document.getElementById('app').innerHTML=`<div class="erro-box"><h2>Maleta não encontrada</h2><p>Este link não contém dados de maleta.<br>Solicite um novo link à loja.</p></div>`;return}try{const json=await decompress(hash);const data=JSON.parse(json);renderApp(data)}catch(e){try{const json=atob(hash.replace(/-/g,'+').replace(/_/g,'/'));renderApp(JSON.parse(json))}catch(e2){document.getElementById('app').innerHTML=`<div class="erro-box"><h2>Erro ao carregar maleta</h2><p>O link pode estar corrompido.<br>Solicite um novo link à loja.</p><p style="font-size:11px;color:#aaa;margin-top:10px">${escapeHtml(e.message)}</p></div>`}}}
init();
</script>
</body>
</html>
